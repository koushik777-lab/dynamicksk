<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="100%" stop-color="#99110A" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0A0A0A" />
  <!-- QR Corner Squares -->
  <rect x="12" y="12" width="28" height="28" rx="6" fill="none" stroke="url(#grad)" stroke-width="6" />
  <rect x="20" y="20" width="12" height="12" rx="3" fill="url(#grad)" />
  
  <rect x="60" y="12" width="28" height="28" rx="6" fill="none" stroke="url(#grad)" stroke-width="6" />
  <rect x="68" y="20" width="12" height="12" rx="3" fill="url(#grad)" />
  
  <rect x="12" y="60" width="28" height="28" rx="6" fill="none" stroke="url(#grad)" stroke-width="6" />
  <rect x="20" y="68" width="12" height="12" rx="3" fill="url(#grad)" />
  
  <!-- QR Data Dots & Center Q -->
  <circle cx="68" cy="68" r="6" fill="#FFFFFF" />
  <circle cx="82" cy="68" r="6" fill="url(#grad)" />
  <circle cx="68" cy="82" r="6" fill="url(#grad)" />
  <rect x="76" y="76" width="12" height="12" rx="3" fill="#FFFFFF" />
  
  <!-- Glowing Center Text Q -->
  <rect x="42" y="42" width="16" height="16" rx="4" fill="url(#grad)" />
